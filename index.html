<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matheus Duarte | Consultoria Estratégica</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Para compilar o React no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Ajustes mobile */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        /* Esconde barra de rolagem mas permite rolar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Configuração do Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyAOoxzUTLKj1fh_1noQ2b6e2QsQ2PNlILs",
            authDomain: "minhas-atividades-964b0.firebaseapp.com",
            projectId: "minhas-atividades-964b0",
            storageBucket: "minhas-atividades-964b0.firebasestorage.app",
            messagingSenderId: "232760630413",
            appId: "1:232760630413:web:6acc8f79226c3823c816c4"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Adaptador de Ícones (FontAwesome) ---
        const Icon = ({ name, size = 16, className = '' }) => <i className={`${name} ${className}`} style={{ fontSize: size }}></i>;
        const Briefcase = (props) => <Icon name="fa-solid fa-briefcase" {...props} />;
        const UserPlus = (props) => <Icon name="fa-solid fa-user-plus" {...props} />;
        const Handshake = (props) => <Icon name="fa-solid fa-handshake" {...props} />;
        const Users = (props) => <Icon name="fa-solid fa-users" {...props} />;
        const Search = (props) => <Icon name="fa-solid fa-magnifying-glass" {...props} />;
        const Plus = (props) => <Icon name="fa-solid fa-plus" {...props} />;
        const Loader2 = (props) => <Icon name="fa-solid fa-spinner fa-spin" {...props} />;
        const Clock = (props) => <Icon name="fa-solid fa-clock" {...props} />;
        const Filter = (props) => <Icon name="fa-solid fa-filter" {...props} />;
        const Trash2 = (props) => <Icon name="fa-solid fa-trash-can" {...props} />;
        const ChevronDown = (props) => <Icon name="fa-solid fa-chevron-down" {...props} />;
        const ChevronRight = (props) => <Icon name="fa-solid fa-chevron-right" {...props} />;
        const LayoutDashboard = (props) => <Icon name="fa-solid fa-layer-group" {...props} />;
        const Check = (props) => <Icon name="fa-solid fa-check" {...props} />;
        const CheckCircle2 = (props) => <Icon name="fa-solid fa-circle-check" {...props} />;
        const Circle = (props) => <Icon name="fa-regular fa-circle" {...props} />;
        const AlertTriangle = (props) => <Icon name="fa-solid fa-triangle-exclamation" {...props} />;
        const CalendarDays = (props) => <Icon name="fa-regular fa-calendar-days" {...props} />;
        const CheckSquare = (props) => <Icon name="fa-solid fa-list-check" {...props} />;
        const LogOut = (props) => <Icon name="fa-solid fa-right-from-bracket" {...props} />;
        const Mail = (props) => <Icon name="fa-solid fa-envelope" {...props} />;
        const Lock = (props) => <Icon name="fa-solid fa-lock" {...props} />;
        const Tag = (props) => <Icon name="fa-solid fa-tag" {...props} />;
        const Edit2 = (props) => <Icon name="fa-solid fa-pen" {...props} />;
        const Compress = (props) => <Icon name="fa-solid fa-compress" {...props} />;
        const WhatsApp = (props) => <Icon name="fa-brands fa-whatsapp" {...props} />;
        const LinkIcon = (props) => <Icon name="fa-solid fa-link" {...props} />;

        // --- Identidade Visual ---
        const CATEGORIES = [
            { id: 'cliente', label: 'Cliente', color: 'bg-green-50 text-[#082f37] border-[#00E08F]/30', icon: Briefcase },
            { id: 'p_cliente', label: 'Potencial Cliente', color: 'bg-amber-50 text-amber-700 border-amber-200', icon: UserPlus },
            { id: 'p_parceiro', label: 'Potencial Parceiro', color: 'bg-purple-50 text-purple-700 border-purple-200', icon: Handshake },
            { id: 'outro', label: 'Outro', color: 'bg-slate-100 text-slate-700 border-slate-200', icon: Users }
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthChecking, setIsAuthChecking] = useState(true);
            const [authForm, setAuthForm] = useState({ email: '', password: '', isLogin: true, error: '', loading: false });
            
            const [projects, setProjects] = useState([]);
            const [customCategories, setCustomCategories] = useState([]);
            const [view, setView] = useState('projects'); 
            const [expandedProjects, setExpandedProjects] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('all');

            // --- Estados dos Modais (Atualizados para suportar Edição) ---
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            
            const [contactModal, setContactModal] = useState({ 
                isOpen: false, mode: 'create', 
                data: { id: '', name: '', objective: '', category: 'p_cliente', phone: '', linkedContactId: '' } 
            });

            const [initiativeModal, setInitiativeModal] = useState({ 
                isOpen: false, mode: 'create', projectId: '', 
                data: { id: '', title: '' } 
            });

            const [taskModal, setTaskModal] = useState({ 
                isOpen: false, mode: 'create', projectId: '', initiativeId: '', 
                data: { id: '', text: '', dueDate: '' } 
            });

            const [categoryModal, setCategoryModal] = useState({ isOpen: false, label: '' });

            // --- Auth Logic ---
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setIsAuthChecking(false);
                });
                return () => unsubscribe();
            }, []);

            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                setAuthForm(prev => ({ ...prev, error: '', loading: true }));
                try {
                    if (authForm.isLogin) {
                        await auth.signInWithEmailAndPassword(authForm.email, authForm.password);
                    } else {
                        await auth.createUserWithEmailAndPassword(authForm.email, authForm.password);
                    }
                } catch (error) {
                    let errorMsg = 'Erro na autenticação. Verifique os seus dados.';
                    if (error.code === 'auth/invalid-credential') errorMsg = 'E-mail ou senha incorretos.';
                    if (error.code === 'auth/email-already-in-use') errorMsg = 'Este e-mail já está em uso.';
                    if (error.code === 'auth/weak-password') errorMsg = 'A senha deve ter pelo menos 6 caracteres.';
                    setAuthForm(prev => ({ ...prev, error: errorMsg }));
                } finally {
                    setAuthForm(prev => ({ ...prev, loading: false }));
                }
            };

            // --- Data Fetching ---
            useEffect(() => {
                if (!user) return;
                
                const unsubscribe = db.collection('projects').onSnapshot((snapshot) => {
                    const projectsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(projectsData);
                }, (error) => console.error("Erro ao buscar dados:", error));

                const unsubCategories = db.collection('categories').onSnapshot((snapshot) => {
                    setCustomCategories(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (error) => console.error("Erro ao buscar categorias:", error));

                return () => {
                    unsubscribe();
                    unsubCategories();
                };
            }, [user]);

            // --- CONTATOS (Criar, Editar, Excluir) ---
            const openCreateContact = () => {
                setContactModal({ isOpen: true, mode: 'create', data: { id: '', name: '', objective: '', category: 'p_cliente', phone: '', linkedContactId: '' } });
            };

            const openEditContact = (project) => {
                setContactModal({ isOpen: true, mode: 'edit', data: { ...project, phone: project.phone || '', linkedContactId: project.linkedContactId || '' } });
            };

            const handleSaveContact = async () => {
                if (!contactModal.data.name || !user || isSubmitting) return;
                setIsSubmitting(true);
                try {
                    const payload = {
                        name: contactModal.data.name,
                        objective: contactModal.data.objective,
                        category: contactModal.data.category,
                        phone: contactModal.data.phone,
                        linkedContactId: contactModal.data.linkedContactId
                    };

                    if (contactModal.mode === 'create') {
                        await db.collection('projects').add({
                            ...payload,
                            status: 'Ativo',
                            createdAt: new Date().toISOString(),
                            initiatives: [] 
                        });
                    } else {
                        await db.collection('projects').doc(contactModal.data.id).update(payload);
                    }
                    setContactModal(prev => ({...prev, isOpen: false}));
                } catch (e) {
                    console.error("Erro ao salvar contato:", e);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const deleteProject = (id) => {
                setConfirmModal({
                    isOpen: true,
                    title: 'Excluir Contato',
                    message: 'Isso apagará o contato e todas as suas iniciativas e tarefas. Não pode ser desfeito. Continuar?',
                    onConfirm: async () => await db.collection('projects').doc(id).delete()
                });
            };

            // --- INICIATIVAS (Criar, Editar, Excluir) ---
            const openCreateInitiative = (projectId) => {
                setInitiativeModal({ isOpen: true, mode: 'create', projectId, data: { id: '', title: '' } });
            };

            const openEditInitiative = (projectId, initiative) => {
                setInitiativeModal({ isOpen: true, mode: 'edit', projectId, data: { id: initiative.id, title: initiative.title } });
            };

            const handleSaveInitiative = async () => {
                if (!initiativeModal.data.title || isSubmitting) return;
                setIsSubmitting(true);
                const project = projects.find(p => p.id === initiativeModal.projectId);
                let updatedInitiatives;
                
                if (initiativeModal.mode === 'create') {
                    const newInit = { id: Date.now().toString(), title: initiativeModal.data.title, status: 'Aberto', date: new Date().toLocaleDateString('pt-BR'), checklist: [] };
                    updatedInitiatives = [...(project.initiatives || []), newInit];
                } else {
                    updatedInitiatives = project.initiatives.map(i => i.id === initiativeModal.data.id ? { ...i, title: initiativeModal.data.title } : i);
                }
                
                await db.collection('projects').doc(initiativeModal.projectId).update({ initiatives: updatedInitiatives });
                setInitiativeModal(prev => ({...prev, isOpen: false}));
                setIsSubmitting(false);
            };

            const confirmDeleteInitiative = (projectId, initiativeId) => {
                setConfirmModal({
                    isOpen: true,
                    title: 'Excluir Iniciativa',
                    message: 'Tem certeza que deseja apagar esta iniciativa e todas as suas tarefas?',
                    onConfirm: async () => {
                        const project = projects.find(p => p.id === projectId);
                        const updatedInitiatives = project.initiatives.filter(i => i.id !== initiativeId);
                        await db.collection('projects').doc(projectId).update({ initiatives: updatedInitiatives });
                    }
                });
            };

            const toggleInitiativeStatus = async (projectId, initiativeId) => {
                const project = projects.find(p => p.id === projectId);
                const updatedInitiatives = project.initiatives.map(init => {
                    if (init.id === initiativeId) return { ...init, status: init.status === 'Concluído' ? 'Aberto' : 'Concluído' };
                    return init;
                });
                await db.collection('projects').doc(projectId).update({ initiatives: updatedInitiatives });
            };

            // --- TAREFAS (Criar, Editar, Excluir) ---
            const openCreateTask = (projectId, initiativeId) => {
                setTaskModal({ isOpen: true, mode: 'create', projectId, initiativeId, data: { id: '', text: '', dueDate: '' } });
            };

            const openEditTask = (projectId, initiativeId, task) => {
                setTaskModal({ isOpen: true, mode: 'edit', projectId, initiativeId, data: { id: task.id, text: task.text, dueDate: task.dueDate || '' } });
            };

            const handleSaveTask = async () => {
                if (!taskModal.data.text || isSubmitting) return;
                setIsSubmitting(true);
                const project = projects.find(p => p.id === taskModal.projectId);
                
                const updatedInitiatives = project.initiatives.map(init => {
                    if (init.id === taskModal.initiativeId) {
                        let updatedChecklist;
                        if (taskModal.mode === 'create') {
                            const newTask = { id: Date.now().toString(), text: taskModal.data.text, dueDate: taskModal.data.dueDate, completed: false };
                            updatedChecklist = [...(init.checklist || []), newTask];
                        } else {
                            updatedChecklist = init.checklist.map(t => t.id === taskModal.data.id ? { ...t, text: taskModal.data.text, dueDate: taskModal.data.dueDate } : t);
                        }
                        return { ...init, checklist: updatedChecklist };
                    }
                    return init;
                });

                await db.collection('projects').doc(taskModal.projectId).update({ initiatives: updatedInitiatives });
                setTaskModal(prev => ({...prev, isOpen: false}));
                setIsSubmitting(false);
            };

            const confirmDeleteTask = (projectId, initiativeId, taskId) => {
                setConfirmModal({
                    isOpen: true,
                    title: 'Excluir Tarefa',
                    message: 'Deseja remover esta tarefa do checklist?',
                    onConfirm: async () => {
                        const project = projects.find(p => p.id === projectId);
                        const updatedInitiatives = project.initiatives.map(init => {
                            if (init.id === initiativeId) {
                                return { ...init, checklist: init.checklist.filter(t => t.id !== taskId) };
                            }
                            return init;
                        });
                        await db.collection('projects').doc(projectId).update({ initiatives: updatedInitiatives });
                    }
                });
            };

            const toggleChecklistItem = async (projectId, initiativeId, itemId) => {
                const project = projects.find(p => p.id === projectId);
                const updatedInitiatives = project.initiatives.map(init => {
                    if (init.id === initiativeId) {
                        return { ...init, checklist: init.checklist.map(item => item.id === itemId ? { ...item, completed: !item.completed } : item) };
                    }
                    return init;
                });
                await db.collection('projects').doc(projectId).update({ initiatives: updatedInitiatives });
            };

            // --- CATEGORIA CUSTOMIZADA ---
            const handleAddCustomCategory = async () => {
                if (!categoryModal.label) return;
                await db.collection('categories').add({ label: categoryModal.label, color: 'bg-slate-100 text-[#082f37] border-slate-300' });
                setCategoryModal({ isOpen: false, label: '' });
            };

            // --- Utils ---
            const getWhatsAppLink = (phone) => {
                if (!phone) return null;
                const numbers = phone.replace(/\D/g, '');
                if(numbers.length < 10) return null;
                // Adiciona o 55 caso o usuário não tenha digitado o código do país, apenas o DDD
                const finalNumber = numbers.startsWith('55') ? numbers : `55${numbers}`;
                return `https://wa.me/${finalNumber}`;
            };

            // --- Derived State ---
            const allPendingTasks = projects.flatMap(p => 
                (p.initiatives || []).flatMap(init => 
                    (init.checklist || [])
                        .filter(item => !item.completed)
                        .map(item => ({ ...item, projectName: p.name, initTitle: init.title, projectId: p.id, initId: init.id, category: p.category }))
                )
            ).sort((a, b) => {
                if (!a.dueDate && !b.dueDate) return 0;
                if (!a.dueDate) return 1;
                if (!b.dueDate) return -1;
                return new Date(a.dueDate) - new Date(b.dueDate);
            });

            const filteredProjects = projects
                .filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()) || p.objective.toLowerCase().includes(searchTerm.toLowerCase()))
                .filter(p => categoryFilter === 'all' || p.category === categoryFilter);

            const allCategories = [...CATEGORIES, ...customCategories.map(c => ({ ...c, icon: Tag }))];
            const getCategoryData = (catId) => allCategories.find(c => c.id === catId) || allCategories[3];

            // --- RENDER ---
            if (isAuthChecking) return <div className="min-h-screen bg-[#f1f5f9] flex items-center justify-center"><Loader2 size={40} className="text-[#00E08F]" /></div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-[#082f37] flex items-center justify-center p-4 font-sans">
                        <div className="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
                            <div className="text-center mb-8">
                                <h1 className="font-extrabold tracking-widest text-sm uppercase text-[#082f37] mb-2">Matheus Duarte</h1>
                                <div className="flex items-center justify-center gap-2 mb-2">
                                    <div className="w-4 h-0.5 bg-[#00E08F]"></div>
                                    <span className="text-[#00E08F] text-[10px] tracking-[0.2em] font-semibold uppercase">Consultoria Estratégica</span>
                                    <div className="w-4 h-0.5 bg-[#00E08F]"></div>
                                </div>
                                <h2 className="text-2xl font-bold text-slate-800 mt-6">{authForm.isLogin ? 'Acessar Painel' : 'Criar Conta'}</h2>
                            </div>
                            
                            <form onSubmit={handleAuthSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold uppercase text-slate-500 tracking-widest mb-2">E-mail</label>
                                    <div className="relative">
                                        <Mail className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input type="email" required className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#00E08F] focus:border-[#082f37] outline-none transition-all" placeholder="seu@email.com" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold uppercase text-slate-500 tracking-widest mb-2">Senha</label>
                                    <div className="relative">
                                        <Lock className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input type="password" required className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#00E08F] focus:border-[#082f37] outline-none transition-all" placeholder="••••••••" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} />
                                    </div>
                                </div>
                                {authForm.error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium text-center">{authForm.error}</div>}
                                <button type="submit" disabled={authForm.loading} className="w-full py-3 bg-[#00E08F] hover:bg-[#00c980] text-[#082f37] font-bold rounded-xl transition-all shadow-lg shadow-[#00E08F]/20 mt-4 flex justify-center items-center">
                                    {authForm.loading ? <Loader2 size={20} /> : (authForm.isLogin ? 'Entrar' : 'Cadastrar')}
                                </button>
                            </form>
                            <div className="mt-6 text-center">
                                <button onClick={() => setAuthForm({...authForm, isLogin: !authForm.isLogin, error: ''})} className="text-sm font-medium text-slate-500 hover:text-[#082f37] transition-colors">
                                    {authForm.isLogin ? 'Não tem uma conta? Cadastre-se' : 'Já tem uma conta? Faça login'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f1f5f9] flex font-sans text-slate-900 pb-20 md:pb-0">
                    {/* Sidebar Desktop */}
                    <nav className="hidden md:flex w-64 bg-[#082f37] border-r border-[#104c57] flex-col h-screen sticky top-0 overflow-y-auto z-40 text-white shadow-xl no-scrollbar">
                        <div className="p-6 flex-1">
                            <div className="mb-10 hidden md:block">
                                <h1 className="font-extrabold tracking-widest text-sm uppercase text-white mb-1">Matheus Duarte</h1>
                                <div className="flex items-center gap-2">
                                    <div className="w-4 h-0.5 bg-[#00E08F]"></div>
                                    <span className="text-[#00E08F] text-[10px] tracking-[0.2em] font-semibold uppercase">Consultoria Estratégica</span>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <button onClick={() => setView('projects')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${view === 'projects' ? 'bg-[#104c57] text-[#00E08F] font-bold border-l-4 border-[#00E08F]' : 'text-slate-400 hover:bg-[#104c57]/50 hover:text-white'}`}>
                                    <Users size={20} /> <span className="hidden md:block">Meus Contatos</span>
                                </button>
                                <button onClick={() => setView('tasks')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${view === 'tasks' ? 'bg-[#104c57] text-[#00E08F] font-bold border-l-4 border-[#00E08F]' : 'text-slate-400 hover:bg-[#104c57]/50 hover:text-white'}`}>
                                    <CheckSquare size={20} /> <span className="hidden md:block">Checklist Geral</span>
                                    {allPendingTasks.length > 0 && <span className="ml-auto bg-[#00E08F] text-[#082f37] font-bold text-[10px] px-2 py-0.5 rounded-full hidden md:block">{allPendingTasks.length}</span>}
                                </button>
                            </div>
                        </div>
                        <div className="p-6 border-t border-[#104c57]">
                            <button onClick={() => auth.signOut()} className="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-400 hover:bg-red-500/10 hover:text-red-400">
                                <LogOut size={20} /> <span className="hidden md:block">Sair</span>
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 p-4 md:p-10 overflow-x-hidden w-full">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div className="flex-1">
                                <h2 className="text-2xl md:text-3xl font-extrabold text-[#082f37] tracking-tight">{view === 'projects' ? 'Painel de Atividades' : 'Tarefas Pendentes'}</h2>
                                <div className="flex items-center gap-2 text-slate-500 mt-1 text-xs md:text-sm font-medium">
                                    <Clock size={14} className="text-[#00E08F]" /> <span>Sincronizado com a nuvem</span>
                                </div>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full md:w-auto">
                                <div className="relative w-full sm:w-auto">
                                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input type="text" placeholder="Pesquisar..." className="pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#00E08F]/50 focus:border-[#082f37] w-full transition-all shadow-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                <button onClick={openCreateContact} className="bg-[#00E08F] hover:bg-[#00c980] text-[#082f37] px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-[#00E08F]/20 transition-all active:scale-95 flex items-center justify-center gap-2 whitespace-nowrap">

                                <div className="flex gap-3">
                                    <button onClick={() => setTaskModal({...taskModal, isOpen: false})} className="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold transition-all">Cancelar</button>
                                    <button onClick={handleSaveTask} disabled={!taskModal.data.text} className="flex-1 px-4 py-3 bg-[#00E08F] hover:bg-[#00c980] text-[#082f37] font-bold rounded-xl transition-all shadow-lg shadow-[#00E08F]/20 disabled:opacity-50">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: NOVA CATEGORIA */}
                    {categoryModal.isOpen && (
                        <div className="fixed inset-0 bg-[#082f37]/80 backdrop-blur-sm flex items-center justify-center p-4 z-[70]">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl">
                                <h3 className="font-extrabold text-[#082f37] mb-6 text-xl">Nova Categoria</h3>
                                <input autoFocus className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#00E08F] focus:border-[#082f37] outline-none transition-all mb-6 font-medium text-slate-800" placeholder="Ex: Agência, Mentor..." value={categoryModal.label} onChange={e => setCategoryModal({...categoryModal, label: e.target.value})} onKeyDown={(e) => { if (e.key === 'Enter') handleAddCustomCategory(); }} />
                                <div className="flex gap-3">
                                    <button onClick={() => setCategoryModal({ isOpen: false, label: '' })} className="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold transition-all">Cancelar</button>
                                    <button onClick={handleAddCustomCategory} disabled={!categoryModal.label} className="flex-1 px-4 py-3 bg-[#00E08F] hover:bg-[#00c980] text-[#082f37] font-bold rounded-xl transition-all shadow-lg shadow-[#00E08F]/20 disabled:opacity-50">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: CONFIRMAÇÃO DE EXCLUSÃO GENÉRICO */}
                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 bg-[#082f37]/80 backdrop-blur-sm flex items-center justify-center p-4 z-[80]">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl">
                                <h3 className="font-extrabold text-[#082f37] mb-2 text-xl">{confirmModal.title}</h3>
                                <p className="text-slate-500 font-medium text-sm mb-8 leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null })} className="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold transition-all">Cancelar</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null }); }} className="flex-1 px-4 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition-all shadow-lg shadow-red-500/20">Sim, Excluir</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Menu Inferior Mobile */}
                    <nav className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 flex justify-around items-center p-3 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] pb-safe">
                        <button onClick={() => setView('projects')} className={`flex flex-col items-center gap-1 p-2 w-20 transition-all ${view === 'projects' ? 'text-[#00E08F]' : 'text-slate-400'}`}>
                            <Users size={24} className={view === 'projects' ? 'drop-shadow-sm text-[#082f37]' : ''} />
                            <span className={`text-[10px] font-bold ${view === 'projects' ? 'text-[#082f37]' : ''}`}>Contatos</span>
                        </button>
                        <button onClick={() => setView('tasks')} className={`flex flex-col items-center gap-1 p-2 w-20 relative transition-all ${view === 'tasks' ? 'text-[#00E08F]' : 'text-slate-400'}`}>
                            <div className="relative">
                                <CheckSquare size={24} className={view === 'tasks' ? 'drop-shadow-sm text-[#082f37]' : ''} />
                                {allPendingTasks.length > 0 && <span className="absolute -top-1 -right-2 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white shadow-sm">{allPendingTasks.length}</span>}
                            </div>
                            <span className={`text-[10px] font-bold ${view === 'tasks' ? 'text-[#082f37]' : ''}`}>Tarefas</span>
                        </button>
                        <button onClick={() => auth.signOut()} className="flex flex-col items-center gap-1 p-2 w-20 text-slate-400 hover:text-red-500 transition-all">
                            <LogOut size={24} />
                            <span className="text-[10px] font-bold">Sair</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
